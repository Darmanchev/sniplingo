name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      WXT_TRANSLATION_API_URL: https://sniplingo-ci.invalid/v1/translate
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run compile
      - run: npm test
      - run: npm run test:ocr
      - run: npm run build:firefox
      - run: npm run check:firefox-manifest
      - run: npm run lint:firefox
      - run: npm run zip:firefox
      - uses: actions/upload-artifact@v7
        with:
          name: firefox-unsigned
          path: .output/*firefox*.zip
          include-hidden-files: true
          if-no-files-found: error

  browser-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: xvfb-run --auto-servernum npm run test:e2e
